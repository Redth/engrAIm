name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.16', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node scripts/selftest.mjs
